version: '3.8'

services:
  # ── MySQL Database ─────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: matrimony-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: matrimony_db
      MYSQL_USER: matrimony
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-matrimonypassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - matrimony-network

  # ── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matrimony-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/matrimony_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: matrimony
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-matrimonypassword}
      JWT_SECRET: ${JWT_SECRET:-matrimony-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      FIREBASE_SERVICE_ACCOUNT_KEY: ${FIREBASE_SERVICE_ACCOUNT_KEY:-firebase-service-account.json}
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    volumes:
      # Mount Firebase service account key (optional – FCM disabled if absent)
      - ./firebase-service-account.json:/app/BOOT-INF/classes/firebase-service-account.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - matrimony-network

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: matrimony-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - matrimony-network

volumes:
  mysql_data:
    driver: local

networks:
  matrimony-network:
    driver: bridge
