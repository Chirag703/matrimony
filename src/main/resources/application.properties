spring.application.name=matrimony

# Database Configuration (MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/matrimony_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:matrimony-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# MessageCentral OTP Configuration
messagecentral.base-url=${MESSAGECENTRAL_BASE_URL:https://cpaas.messagecentral.com}
messagecentral.auth-token=${MESSAGECENTRAL_AUTH_TOKEN}

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator (health check for Docker)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Firebase / FCM Configuration
# Place your Firebase service account JSON in src/main/resources/firebase-service-account.json
firebase.service-account-key=${FIREBASE_SERVICE_ACCOUNT_KEY:firebase-service-account.json}

# Admin Panel Credentials
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:Admin@123}

# Logging
logging.level.com.matrimony=INFO
logging.level.org.springframework.security=WARN
