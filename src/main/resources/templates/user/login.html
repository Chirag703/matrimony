<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Matrimony</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #e84393, #c0392b); min-height: 100vh; }
        .login-card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand-title { color: #e84393; font-weight: 700; font-size: 1.8rem; }
        .otp-step { display: none; }
        .otp-step.active { display: block; }
        .phone-step.active { display: block; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
    <div class="col-md-4 col-11">
        <div class="card login-card p-4">
            <div class="text-center mb-4">
                <div class="brand-title">💑 Matrimony</div>
                <p class="text-muted">Sign in to your account</p>
            </div>

            <div id="alertBox" class="alert d-none" role="alert"></div>

            <!-- Step 1: Phone Number -->
            <div id="phoneStep">
                <div class="mb-3">
                    <label for="phone" class="form-label fw-semibold">Phone Number</label>
                    <div class="input-group">
                        <span class="input-group-text">+91</span>
                        <input type="tel" class="form-control form-control-lg" id="phone"
                               placeholder="Enter 10-digit number" maxlength="10" pattern="[0-9]{10}" required>
                    </div>
                    <div class="form-text">We will send a one-time password to this number.</div>
                </div>
                <div class="d-grid">
                    <button type="button" class="btn btn-danger btn-lg" id="sendOtpBtn" onclick="sendOtp()">
                        Send OTP
                    </button>
                </div>
            </div>

            <!-- Step 2: OTP Verification -->
            <div id="otpStep" class="otp-step">
                <p class="text-muted small mb-3">
                    OTP sent to <strong id="displayPhone"></strong>.
                    <a href="#" onclick="resetPhone()" class="text-danger">Change number?</a>
                </p>
                <div class="mb-3">
                    <label for="otp" class="form-label fw-semibold">Enter OTP</label>
                    <input type="text" class="form-control form-control-lg text-center fs-4 letter-spacing-2"
                           id="otp" placeholder="• • • • • •" maxlength="6" pattern="[0-9]{6}"
                           style="letter-spacing: 0.5rem;" required>
                </div>
                <div class="d-grid mb-2">
                    <button type="button" class="btn btn-danger btn-lg" onclick="verifyOtp()">
                        Verify &amp; Login
                    </button>
                </div>
                <div class="text-center">
                    <small class="text-muted">Didn't receive OTP?
                        <a href="#" id="resendLink" onclick="resendOtp()" class="text-danger">Resend OTP</a>
                    </small>
                </div>
            </div>

            <hr class="my-3">
            <p class="text-center text-muted small mb-0">
                New to Matrimony?
                <a th:href="@{/register}" class="text-danger fw-semibold">Create Free Profile</a>
            </p>
        </div>
        <div class="text-center mt-3">
            <a th:href="@{/}" class="text-white text-decoration-none">
                ← Back to Home
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api';

        function showAlert(message, type) {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type}`;
            box.textContent = message;
            box.classList.remove('d-none');
        }

        function hideAlert() {
            document.getElementById('alertBox').classList.add('d-none');
        }

        function sendOtp() {
            const phone = document.getElementById('phone').value.trim();
            if (phone.length !== 10 || !/^\d{10}$/.test(phone)) {
                showAlert('Please enter a valid 10-digit phone number.', 'danger');
                return;
            }
            hideAlert();
            const btn = document.getElementById('sendOtpBtn');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            fetch(`${API_BASE}/auth/send-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: '+91' + phone })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success !== false) {
                    document.getElementById('displayPhone').textContent = '+91' + phone;
                    document.getElementById('phoneStep').style.display = 'none';
                    document.getElementById('otpStep').classList.add('active');
                    showAlert('OTP sent successfully! Check your messages.', 'success');
                } else {
                    showAlert(data.message || 'Failed to send OTP. Try again.', 'danger');
                }
            })
            .catch(() => showAlert('Network error. Please try again.', 'danger'))
            .finally(() => { btn.disabled = false; btn.textContent = 'Send OTP'; });
        }

        function verifyOtp() {
            const phone = document.getElementById('phone').value.trim();
            const otp = document.getElementById('otp').value.trim();
            if (otp.length !== 6 || !/^\d{6}$/.test(otp)) {
                showAlert('Please enter a valid 6-digit OTP.', 'danger');
                return;
            }
            hideAlert();

            fetch(`${API_BASE}/auth/verify-otp`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: '+91' + phone, otp: otp })
            })
            .then(res => res.json())
            .then(data => {
                if (data.data && data.data.token) {
                    sessionStorage.setItem('jwt_token', data.data.token);
                    sessionStorage.setItem('user_id', data.data.userId || '');
                    window.location.href = data.data.onboardingComplete ? '/dashboard' : '/register';
                } else {
                    showAlert(data.message || 'Invalid OTP. Please try again.', 'danger');
                }
            })
            .catch(() => showAlert('Network error. Please try again.', 'danger'));
        }

        function resetPhone() {
            document.getElementById('phoneStep').style.display = 'block';
            document.getElementById('otpStep').classList.remove('active');
            document.getElementById('otp').value = '';
            hideAlert();
        }

        function resendOtp() {
            sendOtp();
        }

        // Allow Enter key
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('phone').addEventListener('keydown', e => {
                if (e.key === 'Enter') sendOtp();
            });
            document.getElementById('otp').addEventListener('keydown', e => {
                if (e.key === 'Enter') verifyOtp();
            });

            // Redirect if already logged in
            if (sessionStorage.getItem('jwt_token')) {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
