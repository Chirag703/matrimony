<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Matrimony</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; }
        .register-card { border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .brand-bar { background: linear-gradient(135deg, #e84393, #c0392b); }
        .step-indicator .step { width: 36px; height: 36px; border-radius: 50%; background: #dee2e6; color: #6c757d; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; }
        .step-indicator .step.active { background: linear-gradient(135deg, #e84393, #c0392b); color: #fff; }
        .step-indicator .step.done { background: #198754; color: #fff; }
        .step-indicator .divider { flex: 1; height: 2px; background: #dee2e6; }
        .form-step { display: none; }
        .form-step.active { display: block; }
    </style>
</head>
<body>
    <!-- Brand Bar -->
    <div class="brand-bar text-white text-center py-3">
        <a th:href="@{/}" class="text-white text-decoration-none fw-bold fs-4">💑 Matrimony</a>
        <p class="mb-0 small opacity-75">Create your free matrimony profile</p>
    </div>

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="card register-card">
                    <div class="card-body p-4">
                        <!-- Step Indicator -->
                        <div class="step-indicator d-flex align-items-center mb-4">
                            <div class="step active" id="step1Indicator">1</div>
                            <div class="divider"></div>
                            <div class="step" id="step2Indicator">2</div>
                            <div class="divider"></div>
                            <div class="step" id="step3Indicator">3</div>
                        </div>
                        <div class="d-flex justify-content-between mb-4 small text-muted">
                            <span>Verify Phone</span>
                            <span>Basic Info</span>
                            <span>Profile Details</span>
                        </div>

                        <div id="alertBox" class="alert d-none" role="alert"></div>

                        <!-- Step 1: Phone Verification -->
                        <div class="form-step active" id="step1">
                            <h5 class="fw-bold mb-3">Verify Your Phone Number</h5>
                            <div class="mb-3" id="phoneInputGroup">
                                <label class="form-label">Phone Number</label>
                                <div class="input-group">
                                    <span class="input-group-text">+91</span>
                                    <input type="tel" class="form-control" id="phone"
                                           placeholder="10-digit mobile number" maxlength="10">
                                </div>
                            </div>
                            <div class="mb-3 d-none" id="otpInputGroup">
                                <label class="form-label">Enter OTP</label>
                                <input type="text" class="form-control text-center fs-5" id="otp"
                                       placeholder="• • • • • •" maxlength="6"
                                       style="letter-spacing: 0.4rem;">
                                <div class="form-text">OTP sent to <span id="displayPhone" class="fw-semibold text-danger"></span></div>
                            </div>
                            <div class="d-grid">
                                <button class="btn btn-danger" id="step1Btn" onclick="handleStep1()">Send OTP</button>
                            </div>
                        </div>

                        <!-- Step 2: Basic Information -->
                        <div class="form-step" id="step2">
                            <h5 class="fw-bold mb-3">Tell Us About Yourself</h5>
                            <div class="mb-3">
                                <label class="form-label">Full Name *</label>
                                <input type="text" class="form-control" id="name" placeholder="Enter your full name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Date of Birth *</label>
                                <input type="date" class="form-control" id="dob">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Gender *</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="male" value="MALE">
                                        <label class="form-check-label" for="male">Male</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender" id="female" value="FEMALE">
                                        <label class="form-check-label" for="female">Female</label>
                                    </div>
                                </div>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="btn btn-outline-secondary flex-fill" onclick="prevStep(2)">Back</button>
                                <button class="btn btn-danger flex-fill" onclick="saveBasicInfo()">Continue</button>
                            </div>
                        </div>

                        <!-- Step 3: Profile Details -->
                        <div class="form-step" id="step3">
                            <h5 class="fw-bold mb-3">Complete Your Profile</h5>
                            <div class="row g-3">
                                <div class="col-6">
                                    <label class="form-label">Religion</label>
                                    <select class="form-select" id="religion">
                                        <option value="">Select</option>
                                        <option>Hindu</option><option>Muslim</option>
                                        <option>Christian</option><option>Sikh</option>
                                        <option>Buddhist</option><option>Jain</option><option>Other</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Marital Status</label>
                                    <select class="form-select" id="maritalStatus">
                                        <option value="">Select</option>
                                        <option>Never Married</option><option>Divorced</option>
                                        <option>Widowed</option><option>Separated</option>
                                    </select>
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Education</label>
                                    <input type="text" class="form-control" id="education" placeholder="e.g. B.Tech, MBA">
                                </div>
                                <div class="col-6">
                                    <label class="form-label">Occupation</label>
                                    <input type="text" class="form-control" id="occupation" placeholder="e.g. Software Engineer">
                                </div>
                                <div class="col-6">
                                    <label class="form-label">State</label>
                                    <input type="text" class="form-control" id="state" placeholder="e.g. Maharashtra">
                                </div>
                                <div class="col-6">
                                    <label class="form-label">City</label>
                                    <input type="text" class="form-control" id="city" placeholder="e.g. Mumbai">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">About Yourself</label>
                                    <textarea class="form-control" id="about" rows="3"
                                              placeholder="Write a brief description about yourself..."></textarea>
                                </div>
                            </div>
                            <div class="d-flex gap-2 mt-3">
                                <button class="btn btn-outline-secondary flex-fill" onclick="prevStep(3)">Back</button>
                                <button class="btn btn-danger flex-fill" onclick="completeProfile()">
                                    <i class="bi bi-check-circle me-1"></i>Complete Profile
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <span class="text-muted">Already registered?</span>
                    <a th:href="@{/login}" class="text-danger fw-semibold ms-1">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/api';
        let currentStep = 1;
        let otpSent = false;

        function showAlert(msg, type) {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type}`;
            box.textContent = msg;
            box.classList.remove('d-none');
        }

        function hideAlert() {
            document.getElementById('alertBox').classList.add('d-none');
        }

        function setStep(n) {
            document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${n}`).classList.add('active');
            for (let i = 1; i <= 3; i++) {
                const ind = document.getElementById(`step${i}Indicator`);
                ind.className = 'step';
                if (i < n) ind.classList.add('done');
                else if (i === n) ind.classList.add('active');
            }
            currentStep = n;
            hideAlert();
        }

        function prevStep(from) { setStep(from - 1); }

        function handleStep1() {
            if (!otpSent) {
                const phone = document.getElementById('phone').value.trim();
                if (phone.length !== 10 || !/^\d{10}$/.test(phone)) {
                    showAlert('Please enter a valid 10-digit phone number.', 'danger');
                    return;
                }
                const btn = document.getElementById('step1Btn');
                btn.disabled = true; btn.textContent = 'Sending...';

                fetch(`${API_BASE}/auth/send-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: '+91' + phone })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success !== false) {
                        otpSent = true;
                        document.getElementById('phoneInputGroup').classList.add('d-none');
                        document.getElementById('otpInputGroup').classList.remove('d-none');
                        document.getElementById('displayPhone').textContent = '+91' + phone;
                        btn.textContent = 'Verify OTP';
                        showAlert('OTP sent! Check your messages.', 'success');
                    } else {
                        showAlert(data.message || 'Failed to send OTP.', 'danger');
                    }
                })
                .catch(() => showAlert('Network error. Try again.', 'danger'))
                .finally(() => { btn.disabled = false; });
            } else {
                const phone = document.getElementById('phone').value.trim();
                const otp = document.getElementById('otp').value.trim();
                if (otp.length !== 6) { showAlert('Enter 6-digit OTP.', 'danger'); return; }

                fetch(`${API_BASE}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: '+91' + phone, otp })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.data && data.data.token) {
                        sessionStorage.setItem('jwt_token', data.data.token);
                        sessionStorage.setItem('user_id', data.data.userId || '');
                        if (data.data.onboardingComplete) {
                            window.location.href = '/dashboard';
                        } else {
                            setStep(2);
                        }
                    } else {
                        showAlert(data.message || 'Invalid OTP.', 'danger');
                    }
                })
                .catch(() => showAlert('Network error. Try again.', 'danger'));
            }
        }

        function saveBasicInfo() {
            const name = document.getElementById('name').value.trim();
            const dob = document.getElementById('dob').value;
            const gender = document.querySelector('input[name="gender"]:checked');

            if (!name) { showAlert('Please enter your full name.', 'danger'); return; }
            if (!dob) { showAlert('Please enter your date of birth.', 'danger'); return; }
            if (!gender) { showAlert('Please select your gender.', 'danger'); return; }

            const token = sessionStorage.getItem('jwt_token');
            fetch(`${API_BASE}/profile/basic-info`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ name, dob, gender: gender.value })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success !== false) { setStep(3); }
                else { showAlert(data.message || 'Failed to save info.', 'danger'); }
            })
            .catch(() => showAlert('Network error. Try again.', 'danger'));
        }

        function completeProfile() {
            const token = sessionStorage.getItem('jwt_token');
            const profileData = {
                religion: document.getElementById('religion').value,
                maritalStatus: document.getElementById('maritalStatus').value,
                education: document.getElementById('education').value,
                occupation: document.getElementById('occupation').value,
                state: document.getElementById('state').value,
                city: document.getElementById('city').value,
                about: document.getElementById('about').value
            };

            fetch(`${API_BASE}/profile/update`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify(profileData)
            })
            .then(() => fetch(`${API_BASE}/profile/complete-onboarding`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            }))
            .then(() => { window.location.href = '/dashboard'; })
            .catch(() => showAlert('Network error. Try again.', 'danger'));
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Redirect if already logged in
            if (sessionStorage.getItem('jwt_token')) {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
