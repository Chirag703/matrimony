<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Matrimony Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #c0392b, #e84393); }
        .sidebar .nav-link { color: rgba(255,255,255,0.85); padding: 10px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.2); border-radius: 8px; }
        .sidebar .brand { color: #fff; font-size: 1.4rem; font-weight: 700; padding: 20px; }
        .content-area { padding: 30px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 p-0 sidebar">
            <div class="brand">💑 Matrimony</div>
            <nav class="nav flex-column p-2">
                <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                <a class="nav-link active" th:href="@{/admin/users}"><i class="bi bi-people me-2"></i>Users</a>
                <a class="nav-link" th:href="@{/admin/profiles}"><i class="bi bi-person-badge me-2"></i>Profiles</a>
                <a class="nav-link" th:href="@{/admin/subscriptions}"><i class="bi bi-credit-card me-2"></i>Subscriptions</a>
                <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-flag me-2"></i>Reports</a>
                <hr style="border-color: rgba(255,255,255,0.3);">
                <form th:action="@{/admin/logout}" method="post" class="p-2">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 content-area">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>User Management</h2>
                <span class="badge bg-primary fs-6" th:text="${users != null ? users.size() : 0} + ' users'">0 users</span>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Gender</th>
                                <th>Premium</th>
                                <th>Status</th>
                                <th>Joined</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}"></td>
                                <td>
                                    <strong th:text="${user.name != null ? user.name : 'N/A'}"></strong>
                                </td>
                                <td th:text="${user.phone}"></td>
                                <td th:text="${user.gender != null ? user.gender : 'N/A'}"></td>
                                <td>
                                    <span th:if="${user.premium}" class="badge bg-warning text-dark">
                                        <i class="bi bi-star-fill"></i> Premium
                                    </span>
                                    <span th:unless="${user.premium}" class="badge bg-secondary">Free</span>
                                </td>
                                <td>
                                    <span th:if="${user.banned}" class="badge bg-danger">Banned</span>
                                    <span th:unless="${user.banned}" class="badge bg-success">Active</span>
                                </td>
                                <td>
                                    <small th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd/MM/yyyy') : 'N/A'}"></small>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/users/{id}(id=${user.id})}"
                                           class="btn btn-outline-info">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <form th:if="${!user.banned}"
                                              th:action="@{/admin/users/ban/{id}(id=${user.id})}"
                                              method="post" class="d-inline"
                                              onsubmit="return confirm('Ban this user?')">
                                            <button type="submit" class="btn btn-outline-warning">
                                                <i class="bi bi-slash-circle"></i>
                                            </button>
                                        </form>
                                        <form th:if="${user.banned}"
                                              th:action="@{/admin/users/unban/{id}(id=${user.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-success">
                                                <i class="bi bi-check-circle"></i>
                                            </button>
                                        </form>
                                        <form th:unless="${user.premium}"
                                              th:action="@{/admin/users/upgrade-premium/{id}(id=${user.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-warning"
                                                    title="Upgrade to Premium">
                                                <i class="bi bi-star"></i>
                                            </button>
                                        </form>
                                        <form th:action="@{/admin/users/delete/{id}(id=${user.id})}"
                                              method="post" class="d-inline"
                                              onsubmit="return confirm('Delete this user? This cannot be undone.')">
                                            <button type="submit" class="btn btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${users == null or users.isEmpty()}">
                                <td colspan="8" class="text-center py-4 text-muted">No users found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
