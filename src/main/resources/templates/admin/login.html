<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Matrimony</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #e84393, #c0392b); min-height: 100vh; }
        .login-card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .brand-title { color: #e84393; font-weight: 700; font-size: 1.8rem; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="col-md-4">
        <div class="card login-card p-4">
            <div class="text-center mb-4">
                <div class="brand-title">💑 Matrimony</div>
                <p class="text-muted">Admin Panel</p>
            </div>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Invalid credentials. Please try again.
            </div>
            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                You have been logged out successfully.
            </div>

            <form th:action="@{/admin/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Enter admin username" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Enter password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-danger btn-lg">Login</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
