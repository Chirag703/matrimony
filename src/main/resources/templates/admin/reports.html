<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Matrimony Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #c0392b, #e84393); }
        .sidebar .nav-link { color: rgba(255,255,255,0.85); padding: 10px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.2); border-radius: 8px; }
        .sidebar .brand { color: #fff; font-size: 1.4rem; font-weight: 700; padding: 20px; }
        .content-area { padding: 30px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 p-0 sidebar">
            <div class="brand">💑 Matrimony</div>
            <nav class="nav flex-column p-2">
                <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                <a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people me-2"></i>Users</a>
                <a class="nav-link" th:href="@{/admin/profiles}"><i class="bi bi-person-badge me-2"></i>Profiles</a>
                <a class="nav-link" th:href="@{/admin/subscriptions}"><i class="bi bi-credit-card me-2"></i>Subscriptions</a>
                <a class="nav-link active" th:href="@{/admin/reports}"><i class="bi bi-flag me-2"></i>Reports</a>
                <hr style="border-color: rgba(255,255,255,0.3);">
                <form th:action="@{/admin/logout}" method="post" class="p-2">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100">Logout</button>
                </form>
            </nav>
        </div>

        <div class="col-md-10 content-area">
            <h2 class="mb-4">User Reports</h2>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Pending Reports -->
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-danger text-white">
                    <strong><i class="bi bi-exclamation-triangle me-2"></i>Pending Reports
                        (<span th:text="${pendingReports != null ? pendingReports.size() : 0}">0</span>)
                    </strong>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Reporter</th>
                                <th>Reported User</th>
                                <th>Reason</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${pendingReports}">
                                <td th:text="${report.id}"></td>
                                <td th:text="${report.reporter.name != null ? report.reporter.name : report.reporter.phone}"></td>
                                <td th:text="${report.reportedUser.name != null ? report.reportedUser.name : report.reportedUser.phone}"></td>
                                <td>
                                    <span th:text="${#strings.abbreviate(report.reason, 60)}"></span>
                                </td>
                                <td>
                                    <small th:text="${report.createdAt != null ? #temporals.format(report.createdAt, 'dd/MM/yyyy') : 'N/A'}"></small>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <form th:action="@{/admin/reports/suspend/{id}(id=${report.id})}"
                                              method="post" class="d-inline"
                                              onsubmit="return confirm('Suspend reported user?')">
                                            <button type="submit" class="btn btn-danger btn-sm">
                                                <i class="bi bi-slash-circle"></i> Suspend
                                            </button>
                                        </form>
                                        <form th:action="@{/admin/reports/warn/{id}(id=${report.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-warning btn-sm">
                                                <i class="bi bi-exclamation"></i> Warn
                                            </button>
                                        </form>
                                        <form th:action="@{/admin/reports/dismiss/{id}(id=${report.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-secondary btn-sm">
                                                <i class="bi bi-x"></i> Dismiss
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${pendingReports == null or pendingReports.isEmpty()}">
                                <td colspan="6" class="text-center py-4 text-muted">No pending reports</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- All Reports -->
            <div class="card shadow-sm">
                <div class="card-header"><strong>All Reports</strong></div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Reporter</th>
                                <th>Reported User</th>
                                <th>Reason</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="report : ${allReports}">
                                <td th:text="${report.id}"></td>
                                <td th:text="${report.reporter.name != null ? report.reporter.name : report.reporter.phone}"></td>
                                <td th:text="${report.reportedUser.name != null ? report.reportedUser.name : report.reportedUser.phone}"></td>
                                <td><span th:text="${#strings.abbreviate(report.reason, 60)}"></span></td>
                                <td>
                                    <span th:if="${report.status.name() == 'PENDING'}" class="badge bg-danger">Pending</span>
                                    <span th:if="${report.status.name() == 'REVIEWED'}" class="badge bg-warning text-dark">Reviewed</span>
                                    <span th:if="${report.status.name() == 'RESOLVED'}" class="badge bg-success">Resolved</span>
                                </td>
                                <td><small th:text="${report.createdAt != null ? #temporals.format(report.createdAt, 'dd/MM/yyyy') : 'N/A'}"></small></td>
                            </tr>
                            <tr th:if="${allReports == null or allReports.isEmpty()}">
                                <td colspan="6" class="text-center py-4 text-muted">No reports found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
