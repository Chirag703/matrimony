<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Moderation - Matrimony Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #c0392b, #e84393); }
        .sidebar .nav-link { color: rgba(255,255,255,0.85); padding: 10px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.2); border-radius: 8px; }
        .sidebar .brand { color: #fff; font-size: 1.4rem; font-weight: 700; padding: 20px; }
        .content-area { padding: 30px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 p-0 sidebar">
            <div class="brand">💑 Matrimony</div>
            <nav class="nav flex-column p-2">
                <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                <a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people me-2"></i>Users</a>
                <a class="nav-link active" th:href="@{/admin/profiles}"><i class="bi bi-person-badge me-2"></i>Profiles</a>
                <a class="nav-link" th:href="@{/admin/subscriptions}"><i class="bi bi-credit-card me-2"></i>Subscriptions</a>
                <a class="nav-link" th:href="@{/admin/reports}"><i class="bi bi-flag me-2"></i>Reports</a>
                <hr style="border-color: rgba(255,255,255,0.3);">
                <form th:action="@{/admin/logout}" method="post" class="p-2">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100">Logout</button>
                </form>
            </nav>
        </div>

        <div class="col-md-10 content-area">
            <h2 class="mb-4">Profile Moderation</h2>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>User</th>
                                <th>Religion</th>
                                <th>Education</th>
                                <th>City</th>
                                <th>Completion</th>
                                <th>Verified</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="profile : ${profiles}">
                                <td th:text="${profile.id}"></td>
                                <td>
                                    <span th:text="${profile.user.name != null ? profile.user.name : 'N/A'}"></span>
                                    <br>
                                    <small class="text-muted" th:text="${profile.user.phone}"></small>
                                </td>
                                <td th:text="${profile.religion != null ? profile.religion : 'N/A'}"></td>
                                <td th:text="${profile.education != null ? profile.education : 'N/A'}"></td>
                                <td th:text="${profile.city != null ? profile.city : 'N/A'}"></td>
                                <td>
                                    <div class="progress" style="height: 20px; min-width: 80px;">
                                        <div class="progress-bar bg-success"
                                             th:style="'width:' + ${profile.profileCompletion} + '%'"
                                             th:text="${profile.profileCompletion} + '%'"></div>
                                    </div>
                                </td>
                                <td>
                                    <span th:if="${profile.verified}" class="badge bg-success">Verified</span>
                                    <span th:unless="${profile.verified}" class="badge bg-secondary">Pending</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <form th:unless="${profile.verified}"
                                              th:action="@{/admin/profiles/verify/{id}(id=${profile.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-success btn-sm">
                                                <i class="bi bi-check-lg"></i> Approve
                                            </button>
                                        </form>
                                        <form th:if="${profile.verified}"
                                              th:action="@{/admin/profiles/reject/{id}(id=${profile.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit" class="btn btn-danger btn-sm">
                                                <i class="bi bi-x-lg"></i> Reject
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${profiles == null or profiles.isEmpty()}">
                                <td colspan="8" class="text-center py-4 text-muted">No profiles found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
