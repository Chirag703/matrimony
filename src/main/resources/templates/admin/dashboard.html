<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Matrimony</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #c0392b, #e84393); }
        .sidebar .nav-link { color: rgba(255,255,255,0.85); padding: 10px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.2); border-radius: 8px; }
        .sidebar .brand { color: #fff; font-size: 1.4rem; font-weight: 700; padding: 20px; }
        .stat-card { border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .stat-card .icon { font-size: 2.5rem; }
        .content-area { padding: 30px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 p-0 sidebar">
            <div class="brand">💑 Matrimony</div>
            <nav class="nav flex-column p-2">
                <a class="nav-link active" th:href="@{/admin/dashboard}">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
                <a class="nav-link" th:href="@{/admin/users}">
                    <i class="bi bi-people me-2"></i>Users
                </a>
                <a class="nav-link" th:href="@{/admin/profiles}">
                    <i class="bi bi-person-badge me-2"></i>Profiles
                </a>
                <a class="nav-link" th:href="@{/admin/subscriptions}">
                    <i class="bi bi-credit-card me-2"></i>Subscriptions
                </a>
                <a class="nav-link" th:href="@{/admin/reports}">
                    <i class="bi bi-flag me-2"></i>Reports
                </a>
                <hr style="border-color: rgba(255,255,255,0.3);">
                <form th:action="@{/admin/logout}" method="post" class="p-2">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 content-area">
            <h2 class="mb-4">Dashboard Overview</h2>

            <!-- Stats Cards -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card stat-card p-3 text-center border-start border-primary border-4">
                        <div class="icon text-primary mb-2"><i class="bi bi-people-fill"></i></div>
                        <h3 class="fw-bold" th:text="${totalUsers}">0</h3>
                        <p class="text-muted mb-0">Total Users</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card p-3 text-center border-start border-success border-4">
                        <div class="icon text-success mb-2"><i class="bi bi-person-check-fill"></i></div>
                        <h3 class="fw-bold" th:text="${activeUsers}">0</h3>
                        <p class="text-muted mb-0">Active Users</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card p-3 text-center border-start border-warning border-4">
                        <div class="icon text-warning mb-2"><i class="bi bi-star-fill"></i></div>
                        <h3 class="fw-bold" th:text="${premiumUsers}">0</h3>
                        <p class="text-muted mb-0">Premium Users</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card p-3 text-center border-start border-danger border-4">
                        <div class="icon text-danger mb-2"><i class="bi bi-currency-rupee"></i></div>
                        <h3 class="fw-bold" th:text="${revenue != null ? revenue : 0}">0</h3>
                        <p class="text-muted mb-0">Total Revenue (₹)</p>
                    </div>
                </div>
            </div>

            <!-- Secondary Stats -->
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card stat-card p-3">
                        <div class="d-flex align-items-center">
                            <div class="icon text-info me-3"><i class="bi bi-credit-card-2-front-fill fs-2"></i></div>
                            <div>
                                <h4 class="fw-bold mb-0" th:text="${activeSubscriptions}">0</h4>
                                <p class="text-muted mb-0">Active Subscriptions</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card p-3">
                        <div class="d-flex align-items-center">
                            <div class="icon text-danger me-3"><i class="bi bi-flag-fill fs-2"></i></div>
                            <div>
                                <h4 class="fw-bold mb-0" th:text="${pendingReports}">0</h4>
                                <p class="text-muted mb-0">Pending Reports</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card p-3 bg-gradient text-center"
                         style="background: linear-gradient(135deg, #e84393, #c0392b) !important;">
                        <div style="color:white">
                            <i class="bi bi-heart-fill fs-2 mb-2"></i>
                            <p class="mb-0 fw-bold">Matrimony Admin</p>
                            <small>Manage your platform</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
