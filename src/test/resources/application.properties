spring.application.name=matrimony-test

# H2 in-memory database for testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
jwt.secret=test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-test
jwt.expiration=3600000

# Disable security for tests where needed
spring.security.user.name=admin
spring.security.user.password=admin

# Firebase: disable in tests (no service account key available)
firebase.service-account-key=non-existent-firebase-key.json
